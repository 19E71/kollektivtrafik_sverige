name: 🐛 Bug Report
description: Report a bug to help improve the integration.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this report!
  - type: input
    id: ha_version
    attributes:
      label: Home Assistant Version
      placeholder: e.g. 2026.4.2
    validations:
      required: true
  - type: input
    id: stop_id
    attributes:
      label: Stop ID
      placeholder: e.g. 740098000
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Please provide relevant logs from Settings -> System -> Logs.
      render: shell
    validations:
      required: false