name: Hassfest

on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    - cron: "0 0 * * *" # Runs every night at midnight to check against new HA standards

jobs:
  hassfest:
    name: Hassfest Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@master