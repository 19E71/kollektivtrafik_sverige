name: JSON Validation

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  json-lint:
    name: Check JSON Syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          find . -name "*.json" -type f -not -path "./.git/*" -print0 | xargs -0 -I {} python3 -c "import json, sys; json.load(open('{}'))"